name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    name: Build & Lint
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: teams-usb-fix-binaries
          path: |
            target/release/teams_usb_fix.dll
            target/release/injector.exe
            target/release/teams-usb-fix-service.exe

  release:
    name: Release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release

      - name: Create release zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "teams-usb-fix-${tag}-x64.zip"
          $files = @(
            "target/release/teams_usb_fix.dll",
            "target/release/injector.exe",
            "target/release/teams-usb-fix-service.exe",
            "README.md",
            "LICENSE"
          )
          Compress-Archive -Path $files -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
